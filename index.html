<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club de Lectura ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2A9D8F; --teal-light:#4ECDC4; --teal-dark:#1B6B63;
  --aqua:#52B788; --aqua-light:#74C69D;
  --gold:#C9A84C; --gold-light:#E8C97E; --gold-dark:#9A7A2E;
  --cream:#FAF6EF; --cream-dark:#F0E8D8;
  --text:#2C3E35; --text-light:#5A7065;
  --shadow:0 8px 32px rgba(42,157,143,0.15);
  --shadow-gold:0 4px 20px rgba(201,168,76,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 20%,rgba(42,157,143,.08) 0%,transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(201,168,76,.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(82,183,136,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem;}

/* HEADER */
header{text-align:center;padding:2.5rem 0 1.5rem;}
.ornament{color:var(--gold);font-size:1.2rem;letter-spacing:.5rem;opacity:.7;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--teal-dark);line-height:1.15;margin:.4rem 0;}
header h1 span{color:var(--gold);font-style:italic;}
header p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text-light);font-style:italic;margin-top:.4rem;}
.hline{display:flex;align-items:center;gap:1rem;margin:1rem auto;max-width:400px;}
.hline::before,.hline::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.hline span{color:var(--gold);}

/* CARD */
.card{background:white;border-radius:20px;padding:2.2rem;box-shadow:var(--shadow);margin-bottom:1.5rem;border:1px solid rgba(42,157,143,.1);animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--teal-dark);margin-bottom:.25rem;}
.card-sub{font-family:'Cormorant Garamond',serif;font-size:.98rem;color:var(--text-light);font-style:italic;margin-bottom:1.4rem;}

/* LANDING */
.session-picker{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
@media(max-width:500px){.session-picker{grid-template-columns:1fr;}}
.spb{padding:1.7rem 1.2rem;border-radius:20px;border:2px solid var(--cream-dark);background:white;cursor:pointer;text-align:center;transition:all .25s;box-shadow:var(--shadow);}
.spb:hover{border-color:var(--teal-light);}
.spb.gold{border-color:rgba(201,168,76,.3);}
.spb.gold:hover{border-color:var(--gold);box-shadow:0 12px 36px rgba(201,168,76,.2);}
.spb-emoji{font-size:2.4rem;margin-bottom:.5rem;}
.spb-num{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-light);margin-bottom:.25rem;font-family:'Playfair Display',serif;}
.spb-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--teal-dark);font-weight:600;margin-bottom:.35rem;}
.spb.gold .spb-title{color:var(--gold-dark);}
.spb-desc{font-size:.78rem;color:var(--text-light);line-height:1.4;}

/* INPUTS */
.irow{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;}
input[type=text],select,textarea{padding:.72rem 1rem;border:2px solid var(--cream-dark);border-radius:12px;font-family:'Jost',sans-serif;font-size:.93rem;color:var(--text);background:var(--cream);outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
input[type=text]{flex:1;min-width:170px;width:auto;}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,157,143,.12);background:white;}
input[type=text]::placeholder,textarea::placeholder{color:#aac5bf;}
textarea{resize:vertical;min-height:65px;line-height:1.5;}
select{cursor:pointer;}

/* BUTTONS */
.btn{padding:.72rem 1.4rem;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.03em;white-space:nowrap;}
.btn-p{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;box-shadow:0 4px 15px rgba(42,157,143,.35);}
.btn-p:hover{box-shadow:0 6px 20px rgba(42,157,143,.45);}
.btn-g{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:white;box-shadow:var(--shadow-gold);}
.btn-g:hover{box-shadow:0 6px 20px rgba(201,168,76,.5);}
.btn-o{background:transparent;border:2px solid var(--teal-light);color:var(--teal);}
.btn-o:hover{background:rgba(42,157,143,.05);}
.btn-ghost{background:transparent;border:none;color:var(--text-light);font-size:.8rem;cursor:pointer;padding:.25rem .45rem;border-radius:8px;font-family:'Jost',sans-serif;}
.btn-ghost:hover{color:#e07070;}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.9rem;}
.tag{display:flex;align-items:center;gap:.32rem;padding:.38rem .82rem;border-radius:50px;font-size:.86rem;}
.tag-p{background:linear-gradient(135deg,rgba(42,157,143,.1),rgba(82,183,136,.1));border:1px solid rgba(42,157,143,.22);color:var(--teal-dark);}
.tag-g{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(232,201,126,.1));border:1px solid rgba(201,168,76,.28);color:var(--gold-dark);}

/* VOTING S1 */
.voter-hd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:linear-gradient(135deg,rgba(42,157,143,.07),rgba(201,168,76,.04));border-radius:14px;margin-bottom:1.4rem;border:1px solid rgba(42,157,143,.14);}
.voter-name{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--teal-dark);}
.voter-prog{font-size:.78rem;color:var(--text-light);text-align:right;}
.legend{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.78rem;color:var(--text-light);}
.leg-dot{width:11px;height:11px;border-radius:50%;}
.gvi{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;border-radius:12px;border:2px solid var(--cream-dark);margin-bottom:.55rem;transition:all .2s;background:white;}
.gvi:hover{border-color:var(--teal-light);}
.gvi.s3{border-color:var(--gold);background:rgba(201,168,76,.05);}
.gvi.s2{border-color:var(--teal);background:rgba(42,157,143,.05);}
.gvi.s1{border-color:var(--aqua-light);background:rgba(82,183,136,.05);}
.gvi-name{font-size:.93rem;color:var(--text);}
.pts-sel{display:flex;gap:.38rem;}
.pts-btn{width:33px;height:33px;border-radius:50%;border:2px solid var(--cream-dark);background:white;cursor:pointer;font-family:'Jost',sans-serif;font-weight:600;font-size:.83rem;color:var(--text-light);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.pts-btn:hover{border-color:var(--teal-light);color:var(--teal);}
.pts-btn.a3{background:var(--gold);border-color:var(--gold);color:white;box-shadow:0 2px 8px rgba(201,168,76,.4);}
.pts-btn.a2{background:var(--teal);border-color:var(--teal);color:white;box-shadow:0 2px 8px rgba(42,157,143,.4);}
.pts-btn.a1{background:var(--aqua-light);border-color:var(--aqua-light);color:white;}

/* RESULTS */
.rbar-wrap{margin-bottom:1.1rem;}
.rbar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.38rem;}
.rbar-name{font-weight:500;font-size:.93rem;color:var(--text);}
.rbar-pts{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold-dark);font-weight:600;}
.rbar-bg{height:10px;background:var(--cream-dark);border-radius:50px;overflow:hidden;}
.rbar-fill{height:100%;border-radius:50px;background:linear-gradient(to right,var(--teal),var(--gold));transition:width 1s cubic-bezier(.4,0,.2,1);}
.rbar-wrap.win .rbar-name{color:var(--teal-dark);font-weight:700;}
.rbar-wrap.win .rbar-fill{background:linear-gradient(to right,var(--gold),var(--gold-light));}
.badge{display:inline-flex;align-items:center;gap:.25rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:white;padding:.18rem .65rem;border-radius:50px;font-size:.7rem;font-weight:500;margin-left:.35rem;vertical-align:middle;}

/* WINNER BOX */
.win-box{text-align:center;padding:2rem;background:linear-gradient(135deg,rgba(201,168,76,.09),rgba(42,157,143,.07));border-radius:18px;border:2px solid var(--gold-light);margin-bottom:1.4rem;}
.win-box .big{font-size:2.6rem;margin-bottom:.7rem;}
.win-box h2{font-family:'Playfair Display',serif;font-size:1.65rem;color:var(--teal-dark);margin-bottom:.4rem;}
.win-box .wtitle{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold-dark);font-style:italic;margin-bottom:.3rem;}
.win-box p{color:var(--text-light);font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;}

/* BOOKS */
.book-card{padding:.95rem 1.1rem;border:2px solid var(--cream-dark);border-radius:14px;margin-bottom:.75rem;background:white;transition:border-color .2s;}
.book-card:hover{border-color:var(--teal-light);}
.bk-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.35rem;}
.bk-title{font-family:'Playfair Display',serif;font-size:.97rem;color:var(--teal-dark);font-style:italic;}
.bk-author{font-size:.8rem;color:var(--text-light);margin-top:.12rem;}
.bk-prop{font-size:.76rem;background:rgba(42,157,143,.1);color:var(--teal-dark);padding:.18rem .55rem;border-radius:50px;white-space:nowrap;}
.bk-just{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--text-light);font-style:italic;margin-top:.45rem;border-left:2px solid var(--gold-light);padding-left:.75rem;}
.book-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem;}
@media(max-width:500px){.book-form-grid{grid-template-columns:1fr;}}

/* VOTING CLASSIC S2 */
.vbook-item{display:flex;align-items:center;gap:1rem;padding:.85rem 1.1rem;border:2px solid var(--cream-dark);border-radius:12px;margin-bottom:.55rem;cursor:pointer;transition:all .2s;background:white;}
.vbook-item:hover{border-color:var(--teal-light);}
.vbook-item.sel{border-color:var(--gold);background:rgba(201,168,76,.05);}
.vradio{width:20px;height:20px;border-radius:50%;border:2px solid var(--cream-dark);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.vbook-item.sel .vradio{border-color:var(--gold);background:var(--gold);}
.vradio::after{content:'';width:8px;height:8px;border-radius:50%;background:white;opacity:0;transition:opacity .2s;}
.vbook-item.sel .vradio::after{opacity:1;}

/* VOTING MODE SELECTOR */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.5rem;}
@media(max-width:500px){.mode-grid{grid-template-columns:1fr;}}
.mode-btn{padding:1.5rem 1rem;border-radius:16px;border:2px solid var(--cream-dark);background:white;cursor:pointer;text-align:center;transition:all .25s;box-shadow:var(--shadow);}
.mode-btn:hover{border-color:var(--teal-light);}
.mode-btn.gold{border-color:rgba(201,168,76,.3);}
.mode-btn.gold:hover{border-color:var(--gold);}
.mode-emoji{font-size:2rem;margin-bottom:.5rem;}
.mode-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--teal-dark);font-weight:600;margin-bottom:.3rem;}
.mode-btn.gold .mode-title{color:var(--gold-dark);}
.mode-desc{font-size:.75rem;color:var(--text-light);line-height:1.35;}

/* ─── MEMORY GAME ─── */
.mem-stats{display:flex;justify-content:center;gap:2rem;margin-bottom:1rem;flex-wrap:wrap;}
.mem-stat{text-align:center;}
.mem-stat .val{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--teal-dark);font-weight:700;}
.mem-stat .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);}
.mem-turn-bar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(42,157,143,.07),rgba(201,168,76,.04));border:1px solid rgba(42,157,143,.18);border-radius:14px;padding:.75rem 1.2rem;margin-bottom:1rem;}
.mem-turn-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--teal-dark);}
.mem-turn-badge{font-size:.75rem;color:var(--text-light);}
.mem-grid{display:grid;gap:5px;margin-bottom:1rem;}
.mem-card{aspect-ratio:3/4;cursor:pointer;position:relative;perspective:700px;user-select:none;}
.mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.mem-card.face-up .mem-card-inner,.mem-card.revealed .mem-card-inner,.mem-card.elim .mem-card-inner{transform:rotateY(180deg);}
.mem-front,.mem-back{position:absolute;inset:0;border-radius:9px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}
.mem-front{transform:rotateY(0deg);}
.mem-back{transform:rotateY(180deg);background:white;border:2px solid var(--cream-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px;}
.mem-card.saved .mem-back{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.35);}
.mem-card.elim .mem-back{border-color:#e07070;background:#fff8f8;position:relative;}
.mem-back-title{font-family:'Playfair Display',serif;font-size:.6rem;color:var(--teal-dark);font-style:italic;text-align:center;line-height:1.2;}
.mem-back-by{font-size:.54rem;color:var(--text-light);text-align:center;}
.mem-back-tag{font-size:.5rem;background:rgba(42,157,143,.1);color:var(--teal-dark);padding:.1rem .35rem;border-radius:50px;}
.mem-back.is-decoy{background:linear-gradient(135deg,rgba(82,183,136,.08),rgba(42,157,143,.06));border-color:rgba(42,157,143,.2);justify-content:center;align-items:center;}
.mem-result-pop{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mem-result-inner{background:white;border-radius:24px;padding:2rem 2.2rem;text-align:center;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popUp .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popUp{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.mem-result-inner .pop-big{font-size:3.2rem;margin-bottom:.5rem;}
.mem-result-inner h3{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--teal-dark);margin-bottom:.3rem;}
.mem-result-inner .pop-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-light);font-size:1rem;margin-bottom:.8rem;}
.mem-result-inner .pop-book{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold-dark);font-style:italic;margin:.4rem 0 .2rem;}
.mem-result-inner .pop-author{font-size:.82rem;color:var(--text-light);}
.mem-result-inner .pop-proposer{display:inline-block;margin-top:.5rem;background:rgba(42,157,143,.1);border-radius:50px;padding:.2rem .75rem;font-size:.78rem;color:var(--teal-dark);}

/* PAIRS MODE (tic-tac-toe feel) */
.bracket-wrap{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.2rem;}
.bracket-round-title{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--text-light);text-align:center;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;}
.matchup{display:flex;align-items:center;gap:.6rem;background:rgba(42,157,143,.04);border:1px solid rgba(42,157,143,.14);border-radius:14px;padding:.8rem 1rem;}
.matchup-book{flex:1;padding:.65rem .9rem;border-radius:10px;border:2px solid var(--cream-dark);background:white;cursor:pointer;transition:all .2s;text-align:center;}
.matchup-book:hover{border-color:var(--teal-light);}
.matchup-book.winner-pick{border-color:var(--gold);background:rgba(201,168,76,.08);}
.matchup-book.loser-pick{border-color:#ddd;background:#fafafa;opacity:.6;}
.matchup-vs{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--text-light);font-style:italic;flex-shrink:0;}
.matchup-book-title{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--teal-dark);font-style:italic;}
.matchup-book-by{font-size:.7rem;color:var(--text-light);margin-top:.1rem;}

/* TIE BANNER */
.tie-banner{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(42,157,143,.08));border:2px solid var(--gold-light);border-radius:14px;padding:1.2rem;text-align:center;margin-bottom:1.2rem;animation:fadeUp .4s ease;}
.tie-banner .tie-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold-dark);margin-bottom:.4rem;}
.tie-banner p{font-size:.88rem;color:var(--text-light);}

/* INFO BOX */
.info-box{background:linear-gradient(135deg,rgba(42,157,143,.06),rgba(82,183,136,.04));border:1px solid rgba(42,157,143,.2);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.1rem;font-family:'Cormorant Garamond',serif;font-size:.96rem;color:var(--text-light);font-style:italic;}
.divider{height:1px;background:linear-gradient(to right,transparent,var(--cream-dark),transparent);margin:1.3rem 0;}
.confetti-overlay{position:fixed;inset:0;pointer-events:none;z-index:1000;}

/* PROGRESS DOTS */
.prog-dots{display:flex;justify-content:center;gap:.5rem;margin-bottom:1.5rem;}
.prog-dot{width:10px;height:10px;border-radius:50%;background:var(--cream-dark);transition:all .3s;}
.prog-dot.active{background:var(--teal);transform:scale(1.2);}
.prog-dot.done{background:var(--gold);}

/* ── RULETA ── */
.roulette-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;}
.roulette-canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.roulette-canvas-wrap canvas{border-radius:50%;box-shadow:0 8px 32px rgba(42,157,143,.25),0 0 0 6px var(--gold-light);}
.roulette-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:28px solid var(--gold);filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));z-index:10;}
.roulette-spin-btn{padding:1rem 2.5rem;border-radius:50px;border:none;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:white;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;cursor:pointer;box-shadow:var(--shadow-gold);transition:all .2s;letter-spacing:.04em;}
.roulette-spin-btn:hover{box-shadow:0 8px 28px rgba(201,168,76,.55);}
.roulette-spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.roulette-turn{text-align:center;padding:.7rem 1.4rem;background:linear-gradient(135deg,rgba(42,157,143,.07),rgba(201,168,76,.04));border:1px solid rgba(42,157,143,.18);border-radius:50px;}
.roulette-turn .turn-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);}
.roulette-turn .turn-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--teal-dark);font-weight:600;}
.roulette-alive{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.3rem;}
.roulette-alive-tag{padding:.28rem .8rem;border-radius:50px;font-size:.8rem;border:1px solid rgba(42,157,143,.25);background:rgba(42,157,143,.07);color:var(--teal-dark);}
.roulette-alive-tag.dead{background:rgba(224,112,112,.07);border-color:rgba(224,112,112,.25);color:#c0736b;text-decoration:line-through;opacity:.6;}
.roulette-result-pop{text-align:center;padding:1.4rem;background:linear-gradient(135deg,rgba(224,112,112,.08),rgba(201,168,76,.06));border:2px solid rgba(224,112,112,.3);border-radius:16px;animation:fadeUp .35s ease;}
.roulette-result-pop.joker{background:linear-gradient(135deg,rgba(42,157,143,.1),rgba(201,168,76,.08));border-color:var(--gold-light);}
.roulette-result-pop .res-emoji{font-size:2rem;margin-bottom:.4rem;}
.roulette-result-pop .res-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--teal-dark);margin-bottom:.25rem;}
.roulette-result-pop .res-book{font-family:'Playfair Display',serif;font-size:1rem;color:#c0736b;font-style:italic;}
.roulette-result-pop.joker .res-book{color:var(--gold-dark);}
.joker-choices{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:.8rem;}
.joker-btn{padding:.55rem 1.1rem;border-radius:10px;border:2px solid var(--teal-light);background:white;color:var(--teal-dark);font-family:'Jost',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.joker-btn:hover{background:var(--teal);color:white;border-color:var(--teal);}
.joker-btn.danger{border-color:#e07070;color:#c0736b;}
.joker-btn.danger:hover{background:#e07070;color:white;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ornament">✦ ✦ ✦</div>
    <h1>Club de <span>Lectura</span></h1>
    <div class="hline"><span>📖</span></div>
    <p>Un espacio para leer, debatir y crecer</p>
  </header>
  <div id="root"></div>
</div>
<canvas class="confetti-overlay" id="confetti"></canvas>

<script>
// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const S = {
  step: 'landing',
  participants: [],
  genres: [],
  votes: {},
  voterIdx: 0,
  winnerGenre: null,
  tiedGenres: null,       // array of genre names in tie (S1)
  // session 2
  books: [],
  votingMode: null,          // 'classic' | 'memory' | 'pairs'
  // classic voting
  bookVotes: {},
  bookVoterIdx: 0,
  tiedBooks: null,           // array of book indices in tie
  // memory game
  memCards: [],
  memFlipped: [],
  memLocked: false,
  memMoves: 0,
  memSurvivors: [],
  memVoterIdx: 0,
  memPopup: null,
  memBoardSize: 24,  // 24, 40 or 48
  memBoardCols: 6,   // columns for grid
  // roulette game
  roulAlive: [],        // book indices still in play
  roulElim: [],         // eliminated book indices
  roulSpinnerIdx: 0,    // whose turn it is (index into participants)
  roulSpinning: false,
  roulResult: null,     // {type:'eliminate'|'joker', bookIdx, jokerType?}
  roulJokerPending: false,
  roulJokerType: null,  // 'again' | 'save'
  roulSavedIdx: null,   // book idx saved by joker this round
};

// ════════════════════════════════════════════════════
//  ROUTER
// ════════════════════════════════════════════════════
const views = {
  landing:     vLanding,
  setup:       vSetup,
  genres:      vGenres,
  voting:      vVoting,
  results1:    vResults1,
  genreTie:    vGenreTie,
  genreTieVote: vGenreTieVote,
  reviewVotes: vReviewVotes,
  reviewVotesBooks: vReviewVotesBooks,
  s2entry:     vS2Entry,
  s2books:     vS2Books,
  s2mode:      vS2Mode,
  // classic
  s2vote:      vS2Vote,
  s2tie:       vS2Tie,
  // memory
  s2memory:    vS2Memory,
  // roulette
  s2roulette:  vS2Roulette,
  // final
  s2results:   vS2Results,
};


// ════════════════════════════════════════════════════
//  LANDING
// ════════════════════════════════════════════════════
function vLanding() {
  return `<div class="session-picker">
    <div class="spb" onclick="go('setup')">
      <div class="spb-emoji">🗳️</div>
      <div class="spb-num">Sesión 1</div>
      <div class="spb-title">Elegir género</div>
      <div class="spb-desc">Propuesta de géneros y votación ponderada para elegir el del mes</div>
    </div>
    <div class="spb gold" onclick="go('s2entry')">
      <div class="spb-emoji">📚</div>
      <div class="spb-num">Sesión 2</div>
      <div class="spb-title">Elegir libro</div>
      <div class="spb-desc">Ya tenemos el género. Postulación y elección del libro de forma divertida</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — SETUP
// ════════════════════════════════════════════════════
function vSetup() {
  return `<div class="card">
    <div class="card-title">👥 Participantes</div>
    <div class="card-sub">Sesión 1 · Paso 1 de 3 — ¿Quiénes están hoy?</div>
    <div class="irow">
      <input type="text" id="pIn" placeholder="Nombre del participante…" onkeydown="if(event.key==='Enter')addP()">
      <button class="btn btn-p" onclick="addP()">Agregar</button>
    </div>
    <div class="tags">${S.participants.map((p,i)=>`<span class="tag tag-p">${p}<button class="btn-ghost" style="padding:0 0 0 2px;font-size:1rem" onclick="del('participants',${i})">×</button></span>`).join('')}</div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <button class="btn btn-o" onclick="go('landing')">← Inicio</button>
      ${S.participants.length>=2?`<button class="btn btn-g" onclick="go('genres')">Proponer géneros →</button>`:`<span style="font-size:.8rem;color:var(--text-light);font-style:italic">Agrega al menos 2 participantes</span>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — GENRES
// ════════════════════════════════════════════════════
function vGenres() {
  return `<div class="card">
    <div class="card-title">📖 Géneros propuestos</div>
    <div class="card-sub">Sesión 1 · Paso 2 de 3 — Cada quien propone uno, máx. 8</div>
    <div class="info-box">Cada participante propone 1 género y lo justifica en 30 segundos. Con 6–8 opciones la votación fluye mejor.</div>
    <div class="irow">
      <input type="text" id="gIn" placeholder="Escribe un género…" onkeydown="if(event.key==='Enter')addG()">
      <button class="btn btn-p" onclick="addG()">Agregar</button>
    </div>
    <div class="tags">${S.genres.map((g,i)=>`<span class="tag tag-g">${g}<button class="btn-ghost" style="padding:0 0 0 2px;font-size:1rem;color:#c9a84c80" onclick="del('genres',${i})">×</button></span>`).join('')}</div>
    ${!S.genres.length?`<p style="font-size:.8rem;color:var(--text-light);margin-top:.8rem;font-style:italic">¡Aún no hay géneros — comiencen a proponer!</p>`:''}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <button class="btn btn-o" onclick="go('setup')">← Participantes</button>
      ${S.genres.length>=2?`<button class="btn btn-g" onclick="startVoting()">Iniciar votación →</button>`:`<span style="font-size:.8rem;color:var(--text-light);font-style:italic">Necesitas al menos 2 géneros</span>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — VOTING
// ════════════════════════════════════════════════════
function vVoting() {
  const voter = S.participants[S.voterIdx];
  const total = S.participants.length;
  const mv = S.votes[voter] || {};
  const assigned = Object.keys(mv).length;
  const optA = Object.entries(mv).find(([,v])=>v===3)?.[0] || null;
  const optB = Object.entries(mv).find(([,v])=>v===2)?.[0] || null;
  const optC = Object.entries(mv).find(([,v])=>v===1)?.[0] || null;
  const optLabels = {3:'A',2:'B',1:'C'};
  const optColors = {3:'var(--gold)',2:'var(--teal)',1:'var(--aqua-light)'};
  const optBg = {3:'rgba(201,168,76,.08)',2:'rgba(42,157,143,.07)',1:'rgba(82,183,136,.07)'};
  return `<div class="card">
    <div class="voter-hd">
      <div>
        <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:.2rem">🗳 Turno de votar</div>
        <div class="voter-name">${voter}</div>
      </div>
      <div class="voter-prog">${S.voterIdx+1} / ${total}<br><small style="color:var(--teal)">Resultados ocultos ✦</small></div>
    </div>
    <div class="legend" style="margin-bottom:1.2rem">
      <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div><strong>A</strong> — Favorita</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--teal)"></div><strong>B</strong> — Segunda</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--aqua-light)"></div><strong>C</strong> — Tercera</div>
    </div>
    ${S.genres.map(g => {
      const pts = mv[g] || 0;
      const borderColor = pts ? optColors[pts] : 'var(--cream-dark)';
      const bgColor = pts ? optBg[pts] : 'white';
      return `<div class="gvi" style="border-color:${borderColor};background:${bgColor}">
        <span class="gvi-name">${g}</span>
        <div class="pts-sel">
          ${[3,2,1].map(p => {
            const active = pts === p;
            const usedByOther = (p===3&&optA&&optA!==g)||(p===2&&optB&&optB!==g)||(p===1&&optC&&optC!==g);
            return `<button class="pts-btn ${active?'a'+p:''}"
              style="${active?'background:'+optColors[p]+';border-color:'+optColors[p]+';color:white;':''}${usedByOther?'opacity:.28;cursor:not-allowed;':''}"
              onclick="${usedByOther?'void 0':` assignVote('${esc(voter)}','${esc(g)}',${p})`}"
              title="Opción ${optLabels[p]}">${optLabels[p]}</button>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <div style="font-size:.8rem;color:var(--text-light);display:flex;gap:.7rem;flex-wrap:wrap">
        ${optA?`<span style="color:var(--gold-dark)">A: <em>${optA}</em></span>`:`<span style="opacity:.4">A: —</span>`}
        ${optB?`<span style="color:var(--teal-dark)">B: <em>${optB}</em></span>`:`<span style="opacity:.4">B: —</span>`}
        ${optC?`<span style="color:var(--aqua)">C: <em>${optC}</em></span>`:`<span style="opacity:.4">C: —</span>`}
      </div>
      ${assigned===3
        ? `<button class="btn btn-g" onclick="nextVoter()">${S.voterIdx<total-1?'Siguiente →':'Ver resultados ✦'}</button>`
        : `<span style="font-size:.8rem;color:var(--text-light);font-style:italic">Elige tus 3 opciones</span>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — RESULTS
// ════════════════════════════════════════════════════
function vResults1() {
  const sc = calcGenreScores();
  const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const maxPts = sorted[0][1];
  const tied = sorted.filter(([,v])=>v===maxPts).map(([g])=>g);

  if (tied.length > 1) {
    // Store tie info but don't set winner yet
    S.tiedGenres = tied;
    return `<div class="card">
      <div class="card-title">📊 Resultados · Sesión 1</div>
      <div class="card-sub">Votación ponderada — ${S.participants.length} participantes</div>
      <div class="tie-banner">
        <div class="tie-title">⚖️ ¡Empate!</div>
        <p>Los siguientes géneros quedaron empatados con <strong>${maxPts} puntos</strong>. Votamos nuevamente solo entre ellos.</p>
      </div>
      ${sorted.map(([g,pts],i)=>`<div class="rbar-wrap ${pts===maxPts?'win':''}">
        <div class="rbar-hd">
          <span class="rbar-name">${pts===maxPts?'🔁 ':''}${g}${pts===maxPts?'<span class="badge">⚖️ Empate</span>':''}</span>
          <span class="rbar-pts">${pts} pts</span>
        </div>
        <div class="rbar-bg"><div class="rbar-fill" style="width:${maxPts?(pts/maxPts*100):0}%"></div></div>
      </div>`).join('')}
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
        <button class="btn btn-o" onclick="S._reviewBack='results1';go('reviewVotes')">🔍 Ver votación</button>
        <button class="btn btn-g" onclick="startGenreTieBreaker()">Iniciar desempate →</button>
      </div>
    </div>`;
  }

  // Clear winner
  S.winnerGenre = sorted[0][0];
  S.tiedGenres = null;
  setTimeout(()=>confetti(),100);
  return `<div class="card">
    <div class="card-title">🏆 Resultados · Sesión 1</div>
    <div class="card-sub">Votación ponderada — ${S.participants.length} participantes</div>
    <div class="win-box">
      <div class="big">🎉</div>
      <h2>¡El género elegido es!</h2>
      <div class="wtitle">${S.winnerGenre}</div>
      <p>Con ${maxPts} puntos · un gran mes de lectura nos espera</p>
    </div>
    ${sorted.map(([g,pts],i)=>`<div class="rbar-wrap ${i===0?'win':''}">
      <div class="rbar-hd"><span class="rbar-name">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${g}${i===0?'<span class="badge">✦ Ganador</span>':''}</span><span class="rbar-pts">${pts} pts</span></div>
      <div class="rbar-bg"><div class="rbar-fill" style="width:${maxPts?(pts/maxPts*100):0}%"></div></div>
    </div>`).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
      <div style="display:flex;gap:.6rem;flex-wrap:wrap">
        <button class="btn btn-o" onclick="go('landing')">← Inicio</button>
        <button class="btn btn-o" onclick="S._reviewBack='results1';go('reviewVotes')">🔍 Ver votación</button>
      </div>
      <button class="btn btn-g" onclick="prepS2()">Continuar a Sesión 2 →</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — GENRE TIE ANNOUNCE
// ════════════════════════════════════════════════════
function vGenreTie() {
  return `<div class="card">
    <div class="card-title">⚖️ Desempate de géneros</div>
    <div class="card-sub">Solo votan entre los géneros empatados · mismas reglas: A, B, C</div>
    <div class="tie-banner">
      <div class="tie-title">Géneros en desempate</div>
      <p>Cada participante elige su orden de preferencia entre estos géneros.</p>
    </div>
    ${S.tiedGenres.map(g=>`<div class="book-card"><div class="bk-title" style="font-size:1rem;font-style:normal;color:var(--teal-dark)">${g}</div></div>`).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-g" onclick="goGenreTieVote()">Empezar desempate →</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S1 — GENRE TIE VOTING (reuses same A/B/C logic but only tied genres)
// ════════════════════════════════════════════════════
function vGenreTieVote() {
  const voter = S.participants[S.voterIdx];
  const total = S.participants.length;
  const mv = S.votes[voter] || {};
  // only count votes for tied genres
  const pool = S.tiedGenres;
  const assigned = Object.keys(mv).filter(g=>pool.includes(g)).length;
  const needed = Math.min(3, pool.length); // if only 2 tied, only A+B needed
  const optA = Object.entries(mv).find(([g,v])=>v===3&&pool.includes(g))?.[0] || null;
  const optB = Object.entries(mv).find(([g,v])=>v===2&&pool.includes(g))?.[0] || null;
  const optC = pool.length >= 3 ? (Object.entries(mv).find(([g,v])=>v===1&&pool.includes(g))?.[0] || null) : 'skip';
  const optLabels = {3:'A',2:'B',1:'C'};
  const optColors = {3:'var(--gold)',2:'var(--teal)',1:'var(--aqua-light)'};
  const optBg = {3:'rgba(201,168,76,.08)',2:'rgba(42,157,143,.07)',1:'rgba(82,183,136,.07)'};
  const allDone = assigned >= needed;

  return `<div class="card">
    <div class="tie-banner" style="margin-bottom:1.2rem">
      <div class="tie-title">⚖️ Desempate</div>
      <p>Solo entre los géneros empatados${pool.length===2?' — elige A y B':''}</p>
    </div>
    <div class="voter-hd">
      <div>
        <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:.2rem">🗳 Turno de votar</div>
        <div class="voter-name">${voter}</div>
      </div>
      <div class="voter-prog">${S.voterIdx+1} / ${total}<br><small style="color:var(--teal)">Resultados ocultos ✦</small></div>
    </div>
    ${pool.map(g => {
      const pts = mv[g] || 0;
      const borderColor = pts ? optColors[pts] : 'var(--cream-dark)';
      const bgColor = pts ? optBg[pts] : 'white';
      const buttons = pool.length >= 3 ? [3,2,1] : [3,2]; // only A+B if 2 genres
      return `<div class="gvi" style="border-color:${borderColor};background:${bgColor}">
        <span class="gvi-name">${g}</span>
        <div class="pts-sel">
          ${buttons.map(p => {
            const active = pts === p;
            const usedByOther = (p===3&&optA&&optA!==g)||(p===2&&optB&&optB!==g)||(p===1&&optC&&optC!==g&&optC!=='skip');
            return `<button class="pts-btn ${active?'a'+p:''}"
              style="${active?'background:'+optColors[p]+';border-color:'+optColors[p]+';color:white;':''}${usedByOther?'opacity:.28;cursor:not-allowed;':''}"
              onclick="${usedByOther?'void 0':` assignVote('${esc(voter)}','${esc(g)}',${p})`}"
              title="Opción ${optLabels[p]}">${optLabels[p]}</button>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <div style="font-size:.8rem;color:var(--text-light);display:flex;gap:.7rem;flex-wrap:wrap">
        ${optA?`<span style="color:var(--gold-dark)">A: <em>${optA}</em></span>`:`<span style="opacity:.4">A: —</span>`}
        ${optB?`<span style="color:var(--teal-dark)">B: <em>${optB}</em></span>`:`<span style="opacity:.4">B: —</span>`}
      </div>
      ${allDone
        ? `<button class="btn btn-g" onclick="nextGenreTieVoter()">${S.voterIdx<total-1?'Siguiente →':'Ver resultado ✦'}</button>`
        : `<span style="font-size:.8rem;color:var(--text-light);font-style:italic">Elige ${pool.length>=3?'tus 3 opciones':'A y B'}</span>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  REVIEW VOTES
// ════════════════════════════════════════════════════
function vReviewVotes() {
  // Always show ALL genres and ALL votes — never filter by tiedGenres here
  const allGenres = S.genres;
  const optLabels = {3:'A', 2:'B', 1:'C'};
  const optColors = {3:'var(--gold-dark)', 2:'var(--teal-dark)', 1:'var(--aqua)'};
  const optBg     = {3:'rgba(201,168,76,.12)', 2:'rgba(42,157,143,.1)', 1:'rgba(82,183,136,.1)'};
  const optBorder = {3:'rgba(201,168,76,.35)', 2:'rgba(42,157,143,.3)', 1:'rgba(82,183,136,.3)'};

  // Compute total scores across ALL votes (full tally, not filtered)
  const sc = {};
  allGenres.forEach(g => sc[g] = 0);
  Object.values(S.votes).forEach(vm =>
    Object.entries(vm).forEach(([g, p]) => { if (sc[g] !== undefined) sc[g] += p; })
  );
  const sorted = Object.entries(sc).sort((a,b) => b[1] - a[1]);
  const maxPts = sorted[0]?.[1] || 1;

  return `<div class="card">
    <div class="card-title">🔍 Revisión de votación</div>
    <div class="card-sub">Así votó cada participante</div>

    ${S.participants.map(p => {
      const mv = S.votes[p] || {};
      // Show all 3 options (A B C) for every participant, mapped to all genres
      const rows = [3, 2, 1].map(pts => {
        const genre = Object.entries(mv).find(([, v]) => v === pts)?.[0] || null;
        return { label: optLabels[pts], pts, genre };
      });
      return `<div style="padding:.9rem 1.1rem;border:2px solid var(--cream-dark);border-radius:14px;margin-bottom:.65rem;background:white">
        <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--teal-dark);margin-bottom:.6rem">${p}</div>
        <div style="display:flex;flex-wrap:wrap;gap:.45rem">
          ${rows.map(({label, pts, genre}) =>
            genre
              ? `<span style="display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:50px;background:${optBg[pts]};border:1px solid ${optBorder[pts]};font-size:.82rem;color:${optColors[pts]}">
                  <strong>${label}</strong> · ${genre}
                </span>`
              : `<span style="display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:50px;background:var(--cream-dark);font-size:.82rem;color:var(--text-light);opacity:.5">
                  <strong>${label}</strong> · —
                </span>`
          ).join('')}
        </div>
      </div>`;
    }).join('')}

    <div class="divider"></div>

    <div class="card-title" style="font-size:1rem;margin-bottom:.8rem">Puntaje total acumulado</div>
    ${sorted.map(([g, pts], i) => `<div class="rbar-wrap ${i===0?'win':''}">
      <div class="rbar-hd">
        <span class="rbar-name">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${g}</span>
        <span class="rbar-pts">${pts} pts</span>
      </div>
      <div class="rbar-bg"><div class="rbar-fill" style="width:${maxPts?(pts/maxPts*100):0}%"></div></div>
    </div>`).join('')}

    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-start">
      <button class="btn btn-o" onclick="go(S._reviewBack||'results1')">← Volver</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S2 — ENTRY (directo)
// ════════════════════════════════════════════════════
function vS2Entry() {
  return `<div class="card">
    <div class="card-title">📚 Sesión 2 · Acceso directo</div>
    <div class="card-sub">Ingresa el género elegido y los participantes de hoy</div>
    <div class="info-box">Si ya eligieron el género en una sesión anterior, ingrésalo aquí para continuar.</div>
    <div style="margin-bottom:1rem">
      <label style="font-size:.78rem;color:var(--text-light);display:block;margin-bottom:.38rem;text-transform:uppercase;letter-spacing:.05em">Género elegido *</label>
      <input type="text" id="s2g" placeholder="Ej: Literatura latinoamericana…" value="${escAttr(S.winnerGenre||'')}">
    </div>
    <div style="margin-bottom:.5rem">
      <label style="font-size:.78rem;color:var(--text-light);display:block;margin-bottom:.38rem;text-transform:uppercase;letter-spacing:.05em">Participantes *</label>
      <div class="irow">
        <input type="text" id="s2p" placeholder="Nombre del participante…" onkeydown="if(event.key==='Enter')addS2P()">
        <button class="btn btn-p" onclick="addS2P()">Agregar</button>
      </div>
      <div class="tags">${S.participants.map((p,i)=>`<span class="tag tag-p">${p}<button class="btn-ghost" style="padding:0 0 0 2px;font-size:1rem" onclick="del('participants',${i});render()">×</button></span>`).join('')}</div>

      <button class="btn btn-o" onclick="go('landing')">← Inicio</button>
      <button class="btn btn-g" onclick="confirmS2Entry()">Continuar →</button>

  </div>`;
}

    <div class="card-sub">Sesión 2 · Género: <em style="color:var(--gold-dark)">${genre}</em></div>

      <select id="bPart" style="margin-bottom:.6rem"><option value="">— ¿Quién postula? —</option>${unposted.map(p=>`<option value="${escAttr(p)}">${p}</option>`).join('')}</select>

    ${S.books.length?`
    <div class="divider"></div>
    <div class="card-title" style="font-size:1rem;margin-bottom:.75rem">Libros en carrera</div>
    ${S.books.map((b,i)=>`<div class="book-card">
      <div class="bk-hd">
        <div><div class="bk-title">${b.title}</div><div class="bk-author">por ${b.author}${b.country?' · '+b.country:''}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.25rem">

// ════════════════════════════════════════════════════

    <div class="card-sub">Elige el método de votación para hoy</div>

      <div class="mode-btn" onclick="startClassicVoting()">
        <div class="mode-emoji">🗳️</div>
        <div class="mode-title">Votación secreta</div>

        <div class="mode-title">Ruleta de la suerte</div>

      </div>
      <div class="mode-btn" style="grid-column:span 2">
        <div class="mode-emoji">🃏</div>
        <div class="mode-title">Memory literario</div>
        <div class="mode-desc">Encuentra pares de números — los libros están escondidos. ¡El último sin descubrir gana!</div>

          <span style="font-size:.72rem;color:var(--text-light);align-self:center">Tablero:</span>
          ${[[24,4,6],[40,5,8],[48,6,8]].map(([sz,rows,cols])=>{
            const active=S.memBoardSize===sz;
            return `<button onclick="event.stopPropagation();S.memBoardSize=${sz};S.memBoardCols=${cols};render()"
              style="padding:.35rem .85rem;border-radius:8px;border:2px solid ${active?'var(--teal)':'var(--cream-dark)'};background:${active?'var(--teal)':'white'};color:${active?'white':'var(--text-light)'};font-family:Jost,sans-serif;font-size:.82rem;cursor:pointer">${rows}×${cols}</button>`;

        <button class="btn btn-g" style="margin-top:.8rem;width:100%" onclick="startMemoryGame()">Jugar Memory →</button>
      </div>
    </div>

// ════════════════════════════════════════════════════
//  S2 — CLASSIC VOTING
// ════════════════════════════════════════════════════
function vS2Vote() {
  const pool = S.tiedBooks !== null ? S.tiedBooks : S.books.map((_,i)=>i);
  const voter = S.participants[S.bookVoterIdx];
  const total = S.participants.length;
  const myVote = S.bookVotes[voter] ?? null;
  const isTieBreaker = S.tiedBooks !== null;
  return `<div class="card">
    ${isTieBreaker?`<div class="tie-banner"><div class="tie-title">⚖️ Desempate</div><p>Hubo empate. Solo votan entre los libros empatados.</p></div>`:''}
    <div class="voter-hd">
      <div>
        <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:.2rem">🗳 Turno de votar</div>
        <div class="voter-name">${voter}</div>
      </div>
      <div class="voter-prog">${S.bookVoterIdx+1} / ${total}<br><small style="color:var(--teal)">Resultados ocultos ✦</small></div>
    </div>
    <div class="info-box">Elige el libro que más te gustaría leer este mes.</div>
    ${pool.map(bi=>{const b=S.books[bi];return`<div class="vbook-item ${myVote===bi?'sel':''}" onclick="selectBook('${esc(voter)}',${bi})">
      <div class="vradio"></div>
      <div style="flex:1">
        <div class="bk-title" style="font-size:.93rem">${b.title}</div>
        <div class="bk-author">por ${b.author} · Postulado por ${b.participant}</div>
        ${b.justification?`<div class="bk-just" style="margin-top:.3rem;font-size:.82rem">${b.justification}</div>`:''}
      </div>
    </div>`}).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <span></span>
      ${myVote!==null?`<button class="btn btn-g" onclick="nextBookVoter()">${S.bookVoterIdx<total-1?'Siguiente →':'¡Ver resultado! ✦'}</button>`:`<span style="font-size:.8rem;color:var(--text-light);font-style:italic">Selecciona un libro para continuar</span>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S2 — TIE SCREEN (shown between tie rounds)
// ════════════════════════════════════════════════════
function vS2Tie() {
  const tied = S.tiedBooks.map(i=>S.books[i]);
  return `<div class="card">
    <div class="tie-banner">
      <div class="tie-title">⚖️ ¡Empate!</div>
      <p>Los siguientes libros quedaron empatados. Votamos nuevamente entre ellos.</p>
    </div>
    ${tied.map(b=>`<div class="book-card"><div class="bk-hd"><div><div class="bk-title">${b.title}</div><div class="bk-author">por ${b.author}</div></div><span class="bk-prop">${b.participant}</span></div></div>`).join('')}
    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-g" onclick="startTieBreaker()">Iniciar desempate →</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  S2 — MEMORY GAME
// ════════════════════════════════════════════════════
function vS2Memory() {
  const nBooks = S.books.length;
  const total  = S.memBoardSize;
  const cols   = S.memBoardCols || 6;
  const alive  = S.memSurvivors.length;
  const elim   = nBooks - alive;
  const voter  = S.participants[S.memVoterIdx % S.participants.length];

  // Book cover colors (one per book slot)
  const COVERS = ['#2A9D8F','#C9A84C','#52B788','#4ECDC4','#D4845A','#74C69D','#6B4F9E','#1B6B63','#9A7A2E','#E07070'];

  return `<div class="card" style="padding:1.4rem 1.2rem">
    <div class="card-title" style="margin-bottom:.1rem">🃏 Memory Literario</div>
    <div class="card-sub" style="margin-bottom:.8rem">Encuentra pares de números · los libros escondidos se eliminan al descubrirse</div>

    <div class="mem-stats">
      <div class="mem-stat"><div class="val">${S.memMoves}</div><div class="lbl">Turnos</div></div>
      <div class="mem-stat"><div class="val">${alive}</div><div class="lbl">Libros vivos</div></div>
      <div class="mem-stat"><div class="val">${elim}</div><div class="lbl">Eliminados</div></div>
    </div>

    <div class="mem-turn-bar">
      <div>
        <div style="font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:.1rem">Turno de</div>
        <div class="mem-turn-name">${voter}</div>
      </div>
      <span class="mem-turn-badge">Voltea 2 cartas</span>
    </div>

    <div class="mem-grid" style="grid-template-columns:repeat(${cols},1fr)">
      ${S.memCards.map((c,i) => {
        const isUp = c.faceUp || c.tempUp;
        const clickable = !S.memLocked && !c.faceUp && !c.elim && !c.tempUp && !S.memPopup;

        // Back face (closed) — uniform dark teal book design
        const frontHTML = `<div class="mem-front">
          <div style="text-align:center">
            <div style="font-size:.9rem;opacity:.5">📖</div>
            <div style="width:22px;height:2px;background:rgba(255,255,255,.35);margin:3px auto 2px"></div>
            <div style="width:16px;height:2px;background:rgba(255,255,255,.25);margin:0 auto 2px"></div>
            <div style="width:19px;height:2px;background:rgba(255,255,255,.25);margin:0 auto"></div>
          </div>
        </div>`;

        // Open face depends on type
        let backHTML;
        if (c.type === 'book') {
          const b = S.books[c.bookIdx];
          const col = COVERS[c.bookIdx % COVERS.length];
          backHTML = `<div class="mem-back" style="border-color:${col}44;background:${col}11">
            <div style="font-size:.75rem;margin-bottom:1px">${c.elim ? '💀' : '📖'}</div>
            <div class="mem-back-title" style="color:${col}">${b.title}</div>
            <div class="mem-back-by">${b.author}</div>
            ${b.country ? `<div class="mem-back-by">${b.country}</div>` : ''}
            <div class="mem-back-tag" style="background:${col}22;color:${col}">${b.participant}</div>
          </div>`;
        } else {
          // Numbered decoy
          const num = c.pairNum;
          const pairColor = `hsl(${(num * 47) % 360},45%,55%)`;
          backHTML = `<div class="mem-back ${c.faceUp?'mem-pair-found':''}" style="${c.faceUp?`border-color:${pairColor};background:${pairColor}18`:''}">
            <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:${pairColor};line-height:1">${num}</div>
            ${c.faceUp ? `<div style="font-size:.5rem;color:${pairColor};opacity:.7">✓ PAR</div>` : ''}
          </div>`;
        }

        const cardCls = ['mem-card', c.elim?'elim':'', (c.faceUp||c.tempUp)?'face-up':''].filter(Boolean).join(' ');
        return `<div class="${cardCls}" ${clickable?`onclick="memFlip(${i})"`:'style="cursor:default"'}>
          <div class="mem-card-inner">${frontHTML}${backHTML}</div>
        </div>`;
      }).join('')}
    </div>

    <div style="text-align:center;font-size:.76rem;color:var(--text-light);font-style:italic;margin-top:.3rem">
      ${alive} libro${alive!==1?'s':''} en juego · ${Math.floor(S.memBoardSize/2) - nBooks} pares de números
    </div>

    ${S.memPopup ? renderMemPopup(S.memPopup) : ''}
  </div>`;
}

function renderMemPopup(p) {
  if (p.type === 'two-books') {
    const bA = S.books[S.memCards[p.cardA].bookIdx];
    const bB = S.books[S.memCards[p.cardB].bookIdx];
    return `<div class="mem-result-pop"><div class="mem-result-inner">
      <div class="pop-big">📚📚</div>
      <h3>¡Dos libros!</h3>
      <div class="pop-sub">Uno se salva y vuelve boca abajo.<br>El otro queda eliminado. ¿Cuál salvas?</div>
      <div style="display:flex;flex-direction:column;gap:.6rem;margin:.9rem 0">
        <button class="btn btn-p" onclick="memSaveChoice(${p.cardA},${p.cardB})">🛡️ Salvar: <em>${bA.title}</em></button>
        <button class="btn btn-p" onclick="memSaveChoice(${p.cardB},${p.cardA})">🛡️ Salvar: <em>${bB.title}</em></button>
      </div>
    </div></div>`;
  }
  if (p.type === 'book-elim') {
    const book = S.books[p.bookIdx];
    const remaining = S.memSurvivors.length;
    return `<div class="mem-result-pop"><div class="mem-result-inner">
      <div class="pop-big">💀</div>
      <h3>¡Libro eliminado!</h3>
      <div class="pop-book">"${book.title}"</div>
      <div class="pop-author">de ${book.author}</div>
      <div class="pop-proposer">Propuesto por ${book.participant}</div>
      <div class="pop-sub" style="margin-top:.6rem">${remaining} libro${remaining!==1?'s':''} restante${remaining!==1?'s':''}</div>
      <button class="btn btn-g" style="margin-top:.8rem" onclick="memDismiss()">Continuar →</button>
    </div></div>`;
  }
  if (p.type === 'winner') {
    const book = S.books[p.bookIdx];
    return `<div class="mem-result-pop"><div class="mem-result-inner">
      <div class="pop-big">🏆</div>
      <h3>¡Libro superviviente!</h3>
      <div class="pop-book">"${book.title}"</div>
      <div class="pop-author">de ${book.author}</div>
      <div class="pop-proposer">Propuesto por ${book.participant}</div>
      <div class="pop-sub" style="margin-top:.5rem">¡Nadie lo encontró — es el ganador!</div>
      <button class="btn btn-g" style="margin-top:.9rem" onclick="finishMemory()">¡Es el libro del mes! 🎉</button>
    </div></div>`;
  }
  return '';
}

// ════════════════════════════════════════════════════
//  S2 — RULETA
// ════════════════════════════════════════════════════
function vS2Roulette() {
  const alive = S.roulAlive;
  const spinner = S.participants[S.roulSpinnerIdx % S.participants.length];

  if (alive.length === 1 && !S.roulResult) {
    S.winnerBookIdx = alive[0];
    S.votingMode = 'roulette';
    setTimeout(() => go('s2results'), 600);
  }

  return `<div class="card">
    <div class="card-title">🎡 Ruleta de la suerte</div>
    <div class="card-sub">El libro que caiga se elimina · el último sobreviviente gana</div>

    <div class="roulette-wrap">
      <div class="roulette-turn">
        <div class="turn-label">🎲 Turno de</div>
        <div class="turn-name">${spinner}</div>
      </div>

      <div class="roulette-canvas-wrap">
        <div class="roulette-pointer"></div>
        <canvas id="roulCanvas" width="300" height="300"></canvas>
      </div>

      ${!S.roulResult
        ? `<button class="roulette-spin-btn" onclick="spinRoulette()" ${S.roulSpinning?'disabled':''}>
            ${S.roulSpinning ? '✦ Girando…' : '¡Girar la ruleta! 🎡'}
           </button>`
        : ''}

      <!-- Lista de libros -->
      <div style="width:100%;max-width:420px">
        <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);text-align:center;margin-bottom:.5rem">
          ${alive.length} libro${alive.length!==1?'s':''} en juego
        </div>
        <div class="roulette-alive">
          ${S.books.map((b,i) => {
            const isAlive = alive.includes(i);
            const saved = S.roulSavedIdx === i;
            return `<span class="roulette-alive-tag ${isAlive?'':'dead'}" ${saved?'style="border-color:var(--gold);background:rgba(201,168,76,.12)"':''}>
              ${!isAlive ? '💀' : saved ? '🛡️' : 'L'+(i+1)} ${b.participant}
            </span>`;
          }).join('')}
        </div>
      </div>
    </div>

    ${S.roulReveal ? renderRouletteReveal(S.roulReveal) : ''}
  </div>`;
}

function renderRouletteReveal(r) {
  if (r.type === 'joker-again') {
    return `<div class="mem-result-pop"><div class="mem-result-inner" style="border-top:4px solid #4ECDC4">
      <div class="pop-big">🔁</div>
      <h3 style="color:#1B6B63">¡Comodín! Repetir turno</h3>
      <div class="pop-sub">Nadie se elimina — giras de nuevo</div>
      <button class="btn btn-g" style="margin-top:.9rem" onclick="roulJokerAgain()">Girar de nuevo ↺</button>
    </div></div>`;
  }
  if (r.type === 'joker-save') {
    return `<div class="mem-result-pop"><div class="mem-result-inner" style="border-top:4px solid #C9A84C">
      <div class="pop-big">🛡️</div>
      <h3 style="color:var(--gold-dark)">¡Comodín! Salvar libro</h3>
      <div class="pop-sub">Elige un libro para protegerlo del próximo lanzamiento</div>
      <div style="display:flex;flex-direction:column;gap:.5rem;margin:.8rem 0">
        ${S.roulAlive.map(bi => `
          <button class="btn ${S.roulSavedIdx===bi?'btn-g':'btn-o'}" style="font-size:.85rem" onclick="roulSaveBook(${bi})">
            ${S.roulSavedIdx===bi?'🛡️':'📖'} L${bi+1} · ${S.books[bi].title} <small>(${S.books[bi].participant})</small>
          </button>`).join('')}
      </div>
      ${S.roulSavedIdx!==null
        ? `<button class="btn btn-g" onclick="roulConfirmSave()">Confirmar ✓</button>`
        : `<div style="font-size:.78rem;color:var(--text-light);font-style:italic">Selecciona un libro para confirmar</div>`}
    </div></div>`;
  }
  if (r.type === 'joker-elim') {
    return `<div class="mem-result-pop"><div class="mem-result-inner" style="border-top:4px solid #E07070">
      <div class="pop-big">💣</div>
      <h3 style="color:#c0736b">¡Comodín! Eliminar libro</h3>
      <div class="pop-sub">Elige qué libro eliminar directamente</div>
      <div style="display:flex;flex-direction:column;gap:.5rem;margin:.8rem 0">
        ${S.roulAlive.map(bi => `
          <button class="btn btn-o" style="font-size:.85rem;border-color:#e07070;color:#c0736b" onclick="roulJokerElim(${bi})">
            💣 L${bi+1} · ${S.books[bi].title} <small>(${S.books[bi].participant})</small>
          </button>`).join('')}
      </div>
    </div></div>`;
  }
  if (r.type === 'protected') {
    const book = S.books[r.bookIdx];
    return `<div class="mem-result-pop"><div class="mem-result-inner" style="border-top:4px solid #C9A84C">
      <div class="pop-big">🛡️</div>
      <h3 style="color:var(--gold-dark)">¡Libro protegido!</h3>
      <div class="pop-book">"${book.title}"</div>
      <div class="pop-author">de ${book.author} · ${book.participant}</div>
      <div class="pop-sub" style="margin-top:.5rem">Estaba protegido — se libra esta ronda</div>
      <button class="btn btn-g" style="margin-top:.8rem" onclick="roulJokerAgain()">Continuar →</button>
    </div></div>`;
  }
  // Normal elimination
  const book = S.books[r.bookIdx];
  return `<div class="mem-result-pop"><div class="mem-result-inner" style="border-top:4px solid #e07070">
    <div class="pop-big">💀</div>
    <h3 style="color:#c0736b">¡Eliminado!</h3>

  if(!S.votes[voter])S.votes[voter]={};

  if(cur===pts){delete S.votes[voter][genre];}

function calcGenreScores(){
  // only count genres in the active pool (full list or tied subset)
  const pool = S.tiedGenres || S.genres;
  const sc={};
  pool.forEach(g=>sc[g]=0);
  Object.values(S.votes).forEach(vm=>Object.entries(vm).forEach(([g,p])=>{if(sc[g]!==undefined)sc[g]=(sc[g]||0)+p;}));

// ════════════════════════════════════════════════════
//  HANDLERS — MEMORY GAME
// ════════════════════════════════════════════════════
function startMemoryGame() {
  S.votingMode = 'memory';
  S.memMoves = 0;
  S.memLocked = false;
  S.memSurvivors = S.books.map((_,i) => i);
  S.memVoterIdx = 0;
  S.memFlipped = [];
  S.memPopup = null;

  const nBooks = S.books.length;
  const total  = S.memBoardSize || 24;
  const nPairs = total / 2;          // half the board = pairs of numbers
  const nDecoyPairs = nPairs - nBooks; // remaining pairs filled with numbered decoys

  // Build card array: 1 card per book + 2 cards per numbered decoy pair
  let arr = [];
  // Books (1 card each — unique, no pair)
  S.books.forEach((_,i) => arr.push({type:'book', bookIdx:i, pairNum:null, faceUp:false, tempUp:false, elim:false}));
  // Numbered decoys (2 cards each with same number)
  for (let n = 1; n <= nDecoyPairs; n++) {
    arr.push({type:'decoy', bookIdx:null, pairNum:n, faceUp:false, tempUp:false, elim:false});
    arr.push({type:'decoy', bookIdx:null, pairNum:n, faceUp:false, tempUp:false, elim:false});
  }
  // If total is odd due to odd nBooks, add one extra decoy card (visual filler, unmatched)
  while (arr.length < total) {
    arr.push({type:'decoy', bookIdx:null, pairNum:nDecoyPairs+1, faceUp:false, tempUp:false, elim:false});
  }

  // Shuffle
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  S.memCards = arr;
  go('s2memory');
}

function memFlip(idx) {
  const c = S.memCards[idx];
  if (S.memLocked || c.faceUp || c.tempUp || c.elim || S.memPopup) return;
  if (S.memFlipped.length >= 2) return;
  c.tempUp = true;
  S.memFlipped.push(idx);
  render();
  if (S.memFlipped.length === 2) {
    S.memLocked = true;
    S.memMoves++;
    setTimeout(resolveMemFlip, 900);
  }
}

function resolveMemFlip() {
  const [iA, iB] = S.memFlipped;
  const cA = S.memCards[iA], cB = S.memCards[iB];

  const bothDecoys  = cA.type==='decoy' && cB.type==='decoy';
  const bothBooks   = cA.type==='book'  && cB.type==='book';
  const bookDecoy   = (cA.type==='book') !== (cB.type==='book'); // XOR

  if (bothDecoys) {
    if (cA.pairNum === cB.pairNum) {
      // ✅ Matching pair — keep face up permanently
      cA.faceUp = true; cA.tempUp = false;
      cB.faceUp = true; cB.tempUp = false;
    } else {
      // ❌ Different numbers — flip back
      cA.tempUp = false; cB.tempUp = false;
    }
    S.memFlipped = [];
    S.memLocked = false;
    S.memVoterIdx++;
    render();

  } else if (bookDecoy) {
    // Book + number → book eliminated, number flips back
    const bookCard   = cA.type==='book' ? cA : cB;
    const decoyCard  = cA.type==='decoy'? cA : cB;
    bookCard.elim    = true;
    bookCard.faceUp  = true;
    bookCard.tempUp  = false;
    decoyCard.tempUp = false;
    S.memSurvivors   = S.memSurvivors.filter(i => i !== bookCard.bookIdx);
    S.memFlipped     = [];
    S.memLocked      = false;
    S.memPopup       = {type:'book-elim', bookIdx: bookCard.bookIdx};
    render();

  } else if (bothBooks) {
    // Two books — player chooses which to save
    S.memFlipped = [];
    S.memLocked  = false;
    S.memPopup   = {type:'two-books', cardA:iA, cardB:iB};
    render();
  }
}

function memSaveChoice(savedIdx, elimIdx) {
  const saved = S.memCards[savedIdx];
  const elim  = S.memCards[elimIdx];
  // Eliminate one
  elim.faceUp = true; elim.tempUp = false; elim.elim = true;
  S.memSurvivors = S.memSurvivors.filter(i => i !== elim.bookIdx);
  // Save the other — flip back boca abajo
  saved.faceUp = false; saved.tempUp = false;
  S.memPopup = null;
  S.memVoterIdx++;
  checkMemWinner();
}

function memDismiss() {
  S.memPopup = null;
  S.memVoterIdx++;
  checkMemWinner();
}

function checkMemWinner() {
  // Winner = last book whose card is still face-down (not elim, not faceUp)
  const stillHidden = S.memSurvivors.filter(bi => {
    const card = S.memCards.find(c => c.type==='book' && c.bookIdx===bi && !c.elim);
    return card && !card.faceUp;
  });
  if (stillHidden.length === 1) {
    S.winnerBookIdx = stillHidden[0];
    S.memPopup = {type:'winner', bookIdx: stillHidden[0]};
  } else if (S.memSurvivors.length <= 1) {
    S.winnerBookIdx = S.memSurvivors[0] ?? 0;
    S.memPopup = {type:'winner', bookIdx: S.winnerBookIdx};
  }
  render();
}

function finishMemory(){go('s2results');}



// ════════════════════════════════════════════════════
//  ROULETTE HANDLERS
// ════════════════════════════════════════════════════
function startRoulette() {
  S.votingMode = 'roulette';
  S.roulAlive = S.books.map((_,i) => i);
  S.roulElim = [];
  S.roulSpinnerIdx = 0;
  S.roulSpinning = false;
  S.roulResult = null;
  S.roulReveal = null;
  S.roulSavedIdx = null;
  _roulAngle = 0;
  go('s2roulette');
  setTimeout(drawRoulette, 60);
}

const ROUL_COLORS = ['#2A9D8F','#C9A84C','#52B788','#4ECDC4','#E8B86D','#74C69D','#1B6B63','#9A7A2E','#6B4F9E','#D4845A'];
let _roulAngle = 0;

// Joker types in fixed order, cycling
const JOKER_DEFS = [
  {id:'again', label:'🔁', color:'#4ECDC4', name:'Repetir turno'},
  {id:'save',  label:'🛡️', color:'#C9A84C', name:'Salvar libro'},
  {id:'elim',  label:'💣', color:'#E07070', name:'Eliminar libro'},
];
function buildRoulSegments() {
  const alive = S.roulAlive;
  const n = alive.length;
  const segs = [];

  // Always include all 3 jokers, distributed as evenly as possible among books
  // Strategy: interleave books and jokers so wheel always has all 3 comodines
  const totalJokers = JOKER_DEFS.length; // always 3
  const total = n + totalJokers;

  // Place books first, then insert jokers at evenly spaced positions
  const bookSlots = alive.map((bi,i) => ({type:'book', bookIdx:bi, label:'L'+(bi+1)}));
  const jokerSlots = JOKER_DEFS.map(jd => ({type:'joker', jokerId:jd.id, label:jd.label, color:jd.color}));

  // Interleave: spread jokers evenly across the book slots
  const combined = [...bookSlots];
  jokerSlots.forEach((jk, ji) => {
    // Insert after position: floor((ji+1) * n / (totalJokers+1))
    const pos = Math.floor((ji+1) * (n+ji) / (totalJokers+1)) + ji;
    combined.splice(Math.min(pos, combined.length), 0, jk);
  });

  return combined;
}

function drawRoulette(angle) {
  const canvas = document.getElementById('roulCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 5;
  const a = angle !== undefined ? angle : _roulAngle;
  _roulAngle = a;

  const segs = buildRoulSegments();
  const n = segs.length;
  const slice = (2*Math.PI) / n;

  ctx.clearRect(0,0,W,H);

  segs.forEach((seg,i) => {
    const s = a + i*slice, e = s + slice;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,s,e);
    ctx.closePath();
    ctx.fillStyle = seg.type==='joker' ? (seg.color||'#E07070') : ROUL_COLORS[S.roulAlive.indexOf(seg.bookIdx) % ROUL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(s + slice/2);
    ctx.textAlign='right';
    ctx.fillStyle='white';
    ctx.font=`bold ${n>10?10:12}px Jost,sans-serif`;
    ctx.fillText(seg.label, r-10, 4);
    ctx.restore();
  });

  // Center
  ctx.beginPath(); ctx.arc(cx,cy,24,0,2*Math.PI);
  ctx.fillStyle='white'; ctx.fill();
  ctx.strokeStyle='#C9A84C'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#1B6B63'; ctx.font='bold 13px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✦',cx,cy);

  canvas._segs = segs; canvas._slice = slice;
  S._roulSegs = segs; S._roulSlice = slice;
}

function spinRoulette() {
  if (S.roulSpinning || S.roulReveal) return;
  S.roulSpinning = true; render();
  const rotations = (5 + Math.floor(Math.random()*5)) * 2*Math.PI + Math.random()*2*Math.PI;
  const duration = 3200 + Math.random()*1200;
  const start = _roulAngle, end = start + rotations;
  const t0 = performance.now();
  function ease(t){ return 1-Math.pow(1-t,4); }
  function frame(now){
    const t = Math.min((now-t0)/duration,1);
    drawRoulette(start + rotations*ease(t));
    if(t<1){ requestAnimationFrame(frame); }
    else { S.roulSpinning=false; resolveRoulette(end); }
  }
  requestAnimationFrame(frame);
}

function resolveRoulette(finalAngle) {
  // Always rebuild segments fresh at resolution time — guarantees correct mapping
  const segs = buildRoulSegments();
  const n = segs.length;
  const slice = (2 * Math.PI) / n;
  S._roulSegs = segs; S._roulSlice = slice;
  if (!segs || !slice) { render(); return; }

  // Normalize angle to 0..2PI to avoid float accumulation issues
  const norm = ((finalAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  _roulAngle = norm;

  // pointer at top = -PI/2. Find which segment is under the pointer.
  let rel = ((-Math.PI/2 - norm) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const idx = Math.floor(rel / slice) % segs.length;
  const seg = segs[idx];

  // Debug log (remove after testing)
  console.log('Roulette landed on idx:', idx, '/', segs.length, '→', seg.type, seg.jokerId || seg.label);

  if (seg.type==='joker') {
    S.roulReveal = {type: 'joker-'+seg.jokerId};
  } else if (S.roulSavedIdx === seg.bookIdx) {
    S.roulReveal = {type:'protected', bookIdx: seg.bookIdx};
    S.roulSavedIdx = null;
  } else {
    S.roulReveal = {type:'elim', bookIdx: seg.bookIdx};
    S.roulSavedIdx = null;  // protection expires after one full spin round
  }
  render();
  setTimeout(()=>drawRoulette(_roulAngle),40);
}

function roulConfirmElim() {
  const bi = S.roulReveal.bookIdx;
  S.roulAlive = S.roulAlive.filter(i=>i!==bi);
  S.roulElim.push(bi);
  S.roulReveal = null;
  S.roulSpinnerIdx++;
  if (S.roulAlive.length===1) {
    S.winnerBookIdx = S.roulAlive[0];
    S.votingMode = 'roulette';
    go('s2results');
  } else {
    go('s2roulette');
    setTimeout(()=>drawRoulette(_roulAngle),60);
  }
}

function roulJokerAgain() {
  S.roulReveal = null;
  render();
  setTimeout(()=>drawRoulette(_roulAngle),60);
}

function roulSaveBook(bi) {
  S.roulSavedIdx = bi;
  render();
  setTimeout(()=>drawRoulette(_roulAngle),40);
}

function roulConfirmSave() {
  S.roulReveal = null;
  S.roulSpinnerIdx++;
  go('s2roulette');
  setTimeout(()=>drawRoulette(_roulAngle),60);
}

function roulJokerElim(bi) {
  // Directly eliminate chosen book
  S.roulAlive = S.roulAlive.filter(i=>i!==bi);
  S.roulElim.push(bi);
  S.roulReveal = null;
  S.roulSavedIdx = null;
  S.roulSpinnerIdx++;
  if (S.roulAlive.length===1) {
    S.winnerBookIdx = S.roulAlive[0];
    S.votingMode = 'roulette';
    go('s2results');
  } else {
    go('s2roulette');
    setTimeout(()=>drawRoulette(_roulAngle),60);
  }
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function render() {
  document.getElementById('root').innerHTML = (views[S.step] || vLanding)();
  if (S.step === 's2roulette') {
    setTimeout(() => drawRoulette(_roulAngle), 40);
  }
}

// ════════════════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════════════════
function go(step){S.step=step;render();window.scrollTo({top:0,behavior:'smooth'});}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function escAttr(s){return String(s).replace(/"/g,'&quot;')}
function resetAll(){
  Object.assign(S,{step:'landing',participants:[],genres:[],votes:{},voterIdx:0,winnerGenre:null,tiedGenres:null,_reviewBack:null,books:[],votingMode:null,bookVotes:{},bookVoterIdx:0,tiedBooks:null,winnerBookIdx:null,memCards:[],memFlipped:[],memLocked:false,memMoves:0,memSurvivors:[],roulAlive:[],roulElim:[],roulSpinnerIdx:0,roulSpinning:false,roulResult:null,roulReveal:null,roulSavedIdx:null,_roulSegs:null,_roulSlice:null,memVoterIdx:0,memPopup:null,memBoardSize:24,memBoardCols:6});
  render();
}

// ════════════════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════════════════
function confetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#2A9D8F','#C9A84C','#52B788','#4ECDC4','#E8C97E','#74C69D'];
  const pieces=Array.from({length:90},()=>({x:Math.random()*canvas.width,y:Math.random()*-canvas.height,w:Math.random()*8+4,h:Math.random()*14+6,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rs:(Math.random()-.5)*6,sp:Math.random()*3+2,dr:(Math.random()-.5)*1.5}));
  let f=0;
  (function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=.85;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.y+=p.sp;p.x+=p.dr;p.rot+=p.rs;});if(++f<200)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);})();
}

render();
</script>
